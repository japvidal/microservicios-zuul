spring.application.name=microservicio-zuul
server.port=8090

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
spring.main.web-application-type=reactive
springdoc.api-docs.enabled=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30
springdoc.swagger-ui.urls[0].name=competitions
springdoc.swagger-ui.urls[0].url=/api/futfem/competitions/v3/api-docs
springdoc.swagger-ui.urls[1].name=competitions-temp
springdoc.swagger-ui.urls[1].url=/api/futfem/competitionstemp/v3/api-docs
springdoc.swagger-ui.urls[2].name=players
springdoc.swagger-ui.urls[2].url=/api/futfem/players/v3/api-docs
springdoc.swagger-ui.urls[3].name=players-temp
springdoc.swagger-ui.urls[3].url=/api/futfem/playerstemp/v3/api-docs
springdoc.swagger-ui.urls[4].name=teams
springdoc.swagger-ui.urls[4].url=/api/futfem/teams/v3/api-docs
springdoc.swagger-ui.urls[5].name=teams-temp
springdoc.swagger-ui.urls[5].url=/api/futfem/teamstemp/v3/api-docs
springdoc.swagger-ui.urls[6].name=positions
springdoc.swagger-ui.urls[6].url=/api/futfem/positions/v3/api-docs
springdoc.swagger-ui.urls[7].name=referees
