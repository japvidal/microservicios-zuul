spring.cloud.gateway.routes[0].id=competitions
spring.cloud.gateway.routes[0].uri=lb://microservicio-futfem-competitions
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/futfem/competitions/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=3

